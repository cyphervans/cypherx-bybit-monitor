services:
  - type: worker
    name: cypherx-bybit-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        value: "6447141249"
      - key: DATABASE_URL
        fromDatabase:
          name: cypherx-bybit-db
          property: connectionString

databases:
  - name: cypherx-bybit-db
    plan: free
